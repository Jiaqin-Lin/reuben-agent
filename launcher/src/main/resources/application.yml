# =============================================================================
# reuben-agent 本地开发配置
# 对应 docker-compose.yml 中的中间件服务
# =============================================================================

spring:
  application:
    name: reuben-agent

  # ---------------------------------------------------------------------------
  # 文件上传大小限制
  # ---------------------------------------------------------------------------
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 110MB

  # ---------------------------------------------------------------------------
  # AI — 仅保留 DeepSeek Chat + Ollama Embedding，其余禁用
  # 本地开发用 fake key，生产环境通过环境变量覆盖
  # ---------------------------------------------------------------------------
  ai:
    model:
      chat: deepseek
      embedding: ollama
    deepseek:
      api-key: ${SPRING_AI_DEEPSEEK_API_KEY:fake-dev-key}
      chat:
        options:
          model: ${AI_MODEL:deepseek-v4-flash}
    ollama:
      base-url: http://localhost:11434
      chat:
        enabled: false
      embedding:
        model: bge-m3

  # ---------------------------------------------------------------------------
  # MySQL 8.0 — 关系型数据
  # ---------------------------------------------------------------------------
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3307/reuben_agent?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123

  # ---------------------------------------------------------------------------
  # Redis — ID生成器 WorkerID 分配 + 分布式锁
  # ---------------------------------------------------------------------------
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      # 本地单机无密码

  # ---------------------------------------------------------------------------
  # Elasticsearch 8.x
  # ---------------------------------------------------------------------------
  elasticsearch:
    uris: http://127.0.0.1:9200
    connection-timeout: 3s
    socket-timeout: 5s

  # ---------------------------------------------------------------------------
  # Neo4j 5.x
  # ---------------------------------------------------------------------------
  neo4j:
    uri: bolt://127.0.0.1:7687
    authentication:
      username: neo4j
      password: neo4j123

  # ---------------------------------------------------------------------------
  # Kafka 3.8
  # ---------------------------------------------------------------------------
  kafka:
    bootstrap-servers: 127.0.0.1:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

  # ---------------------------------------------------------------------------
  # 排除不需要的自动配置（DeepSeek 依赖传递了 OpenAI，但我们不使用）
  # ---------------------------------------------------------------------------
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.chat.client.autoconfigure.ChatClientAutoConfiguration

# =============================================================================
# reuben-agent 业务模块配置
# =============================================================================
reuben:
  document:
    minio:
      endpoint: http://127.0.0.1:9000
      access-key: minioadmin
      secret-key: minioadmin
      bucket-name: reuben-agent-document
      object-prefix: rag/document
    pgvector:
      host: 127.0.0.1
      port: 5432
      database: reuben_agent_pgvector
      username: reuben
      password: reuben123
      table-name: public.reuben_agent_document_embedding
      batch-size: 10
      embedding-model: bge-m3
    elasticsearch:
      index-name: reuben_document_chunk
      route-index-name: reuben_agent_knowledge_route
      navigation-index-name: reuben_agent_document_navigation
    neo4j:
      # 默认关闭，需要图查询时手动开启
      enabled: false
      uri: bolt://127.0.0.1:7687
      username: neo4j
      password: ${NEO4J_PASSWORD:neo4j123}
      database: neo4j
      query-timeout-seconds: 5
      max-connection-pool-size: 10
      connection-acquisition-timeout-ms: 5000
      cache-node-threshold: 2000
    knowledge-route:
      enabled: true
      semantic-floor: 0.20
      semantic-weight: 50.0
      lexical-cap: 10.0
      lexical-weight: 1.6
      entity-hit-score: 6.0
      scope-boost-topic: 8.0
      scope-boost-document: 15.0
      relation-score-weight: 20.0
      confidence-normalizer-base: 10.0
      confidence-normalizer-offset: 5.0
      low-confidence-threshold: 0.55
      batch-embedding-size: 10
      max-scope-candidates: 5
      max-topic-candidates: 8
      max-document-candidates: 5
      token-min-length: 2
      token-max-count: 40
    kafka:
      parse-topic: reuben-agent-document-parse-route
      index-topic: reuben-agent-document-index-build
      group-id: reuben-agent-document
      auto-create-topics: true
    embedding:
      dimension: 1024

  # ---------------------------------------------------------------------------
  # RAG — 混合检索配置（向量 + 关键词 → RRF 融合）
  # ---------------------------------------------------------------------------
  rag:
    mysql:
      host: 127.0.0.1
      port: 3307
      database: reuben_agent
      username: root
      password: root123
      pool-name: RagMySqlPool
    query-rewrite:
      enabled: true
      min-query-length: 6
    retrieval:
      vector-top-k: 8
      keyword-top-k: 8
      final-top-k: 5
      rrf-k: 60
      channel-timeout-ms: 5000
      min-vector-similarity: 0.45
      keyword-relative-score-floor: 0.35
    rerank:
      enabled: false
      url: https://api.siliconflow.cn/v1/rerank
      api-key: ${SILICONFLOW_API_KEY:}
      model: BAAI/bge-reranker-v2-m3
      top-n: 5
      connect-timeout-ms: 3000
      read-timeout-ms: 6000
    pgvector:
      host: 127.0.0.1
      port: 5432
      database: reuben_agent_pgvector
      username: reuben
      password: reuben123
      table-name: public.reuben_agent_document_embedding
      pool-name: RagPgVectorPool
    elasticsearch:
      index-name: reuben_document_chunk
    embedding:
      model: bge-m3
      dimension: 1024

  # ---------------------------------------------------------------------------
  # Chat — 对话模块配置（systemPrompt / recommendationPrompt 由 yaml 注入，
  # DeepSeek key 复用全局 spring.ai.deepseek.api-key）
  # ---------------------------------------------------------------------------
  chat:
    agent:
      systemPrompt: |
        你是 reuben-agent 的智能对话助手。
        你的目标是帮助用户获得可靠、结构化、可直接使用的答案。

        回答原则：
        1. 对于明显具有时效性、事实性、需要外部验证的问题，优先调用 tavily_search 工具联网核实。尤其是涉及"今天、明天、昨天、现在、当前、最新、本周、本月、今年"等相对时间的问题，必须以当前日期为准理解，并优先搜索核实。
        2. 如果工具结果不足以支撑结论，要明确说明不确定性，不要编造事实。
        3. 回答尽量结构化、清晰、简洁，适合直接返回给前端展示。
        4. 不要在最终答案中暴露工具调用细节或内部推理格式。
        5. 当已有信息足够时，直接给出最终答案，不要重复调用工具。
      maxModelCallsPerRun: 8
      maxModelCallsPerThread: 40
      maxToolCallsPerRun: 6
      maxToolCallsPerThread: 30
      historyPreviewTurns: 4
    memory:
      keepRecentTurns: 4
      compressionBatchTurns: 6
      recentTranscriptMaxChars: 2200
      userPromptMaxChars: 8000
      answerMaxChars: 16000
      summaryMaxChars: 1200
    rag:
      topK: 5
      minScore: 0.0
      charBudget: 3000
      maxEvidenceCount: 6
      rerankEnabled: false
    recommendation:
      enabled: true
      timeoutMs: 3000
      maxCount: 3
      prompt: |
        你是推荐问题生成助手。
        请根据最近几轮对话和最新一轮问答，生成适合继续追问的中文问题。
        要求自然、具体、可继续追问，不要和当前问题重复，每个问题控制在 20 字以内。
    tavily:
      baseUrl: https://api.tavily.com
      apiKey: ${TAVILY_API_KEY:}
      topic: general
      searchDepth: basic
      maxResults: 5
      timeoutMs: 8000
    executor:
      ragPoolSize: 4
      memoryPoolSize: 2
      postProcessPoolSize: 4
    trace:
      persistenceEnabled: true
      benchmarkWindowSize: 100
    lease:
      ttlSeconds: 60
    rewrite:
      enabled: true
      needsRewriteNoHistoryChars: 8
      needsRewriteWithHistoryChars: 18
      maxSubQuestions: 4
      temperature: 0.2
      topP: 0.8
      thinkingEnabled: false
    orchestration:
      clarifyConfidenceThreshold: 0.45
      clarifyTopScoreDiff: 0.001
      routeCandidateTopK: 5
    navigation:
      structureSummaryNodeThreshold: 50
      structureSummaryMaxNodes: 50
      sectionMatchThreshold: 45.0
      sectionPathScore: 100.0
      titleScore: 90.0
      anchorTextScore: 80.0
      contentTextScore: 45.0
      llmIntentConfidenceThreshold: 0.75
      llmIntentTemperature: 0.0
      llmIntentTemplate: document-graph-only-intent
    pricing:
      perKTokenCost: {}

# =============================================================================
# MyBatis-Plus
# =============================================================================
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# =============================================================================
# 日志
# =============================================================================
logging:
  level:
    com.reubenagent: debug
